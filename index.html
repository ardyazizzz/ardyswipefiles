<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swipe.ardy</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f4;
      --bg-tertiary: #f0efee;
      --text-primary: #1a1a1a;
      --text-secondary: #6b7280;
      --text-tertiary: #9ca3af;
      --border: rgba(0,0,0,0.1);
      --border-hover: rgba(0,0,0,0.2);
      --radius-md: 8px;
      --radius-lg: 12px;
      --shadow: 0 4px 16px rgba(0,0,0,0.08);
      --accent: #1a1a1a;
      --accent-text: #ffffff;
      --liked: #E24B4A;
      --liked-bg: #FCEBEB;
      --liked-border: #F09595;
      --liked-text: #A32D2D;
      --info-bg: #E6F1FB;
      --info-text: #185FA5;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* Layout */
    .app { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-name { font-size: 18px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.4px; }
    .brand-name span { color: var(--text-tertiary); font-weight: 400; }
    .count-badge { font-size: 11px; padding: 2px 9px; border-radius: 20px; background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-tertiary); }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    /* Search */
    .search-box { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 7px 12px; }
    .search-box input { border: none; background: transparent; font-size: 13px; color: var(--text-primary); outline: none; width: 180px; font-family: inherit; }
    .search-box input::placeholder { color: var(--text-tertiary); }
    .search-box i { font-size: 15px; color: var(--text-tertiary); }

    /* Buttons */
    .btn-primary { display: flex; align-items: center; gap: 6px; padding: 8px 16px; font-size: 13px; font-weight: 500; border-radius: var(--radius-md); background: var(--accent); color: var(--accent-text); border: none; cursor: pointer; font-family: inherit; transition: opacity 0.15s; white-space: nowrap; }
    .btn-primary:hover { opacity: 0.82; }
    .btn-ghost { display: flex; align-items: center; gap: 6px; padding: 8px 12px; font-size: 13px; border-radius: var(--radius-md); background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border); cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
    .btn-ghost:hover { background: var(--bg-secondary); border-color: var(--border-hover); }
    .btn-cancel { padding: 8px 16px; font-size: 13px; border-radius: var(--radius-md); border: 1px solid var(--border); background: transparent; color: var(--text-secondary); cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .btn-cancel:hover { background: var(--bg-secondary); }
    .btn-save { padding: 8px 16px; font-size: 13px; font-weight: 500; border-radius: var(--radius-md); border: none; background: var(--accent); color: var(--accent-text); cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
    .btn-save:hover { opacity: 0.82; }

    /* Filter bar */
    .filterbar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .dropdown { position: relative; display: inline-block; }
    .dropdown-btn { display: flex; align-items: center; gap: 6px; padding: 7px 12px; font-size: 12px; border-radius: var(--radius-md); background: var(--bg); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
    .dropdown-btn.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    .dropdown-btn:hover:not(.active) { border-color: var(--border-hover); }
    .dropdown-menu { position: absolute; top: calc(100% + 6px); left: 0; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 6px; min-width: 170px; z-index: 100; display: none; box-shadow: var(--shadow); }
    .dropdown-menu.open { display: block; }
    .dropdown-item { padding: 8px 10px; font-size: 13px; border-radius: 6px; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; justify-content: space-between; gap: 8px; transition: background 0.1s; }
    .dropdown-item:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .dropdown-item.selected { color: var(--text-primary); font-weight: 500; }
    .divider { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

    /* Results */
    .results-label { font-size: 12px; color: var(--text-tertiary); margin-bottom: 14px; }

    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }

    /* Card */
    .card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s; display: flex; flex-direction: column; }
    .card:hover { border-color: var(--border-hover); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.07); }
    .card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 10px; cursor: pointer; }
    .card-body:hover .card-text { color: var(--text-primary); }
    .card-edit-hint { font-size: 11px; color: var(--text-tertiary); display: none; align-items: center; gap: 4px; margin-top: 2px; }
    .card-body:hover .card-edit-hint { display: flex; }
    .card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .card-author { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
    .author-name { font-size: 12px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .author-date { font-size: 11px; color: var(--text-tertiary); }
    .platform-badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; background: var(--info-bg); color: var(--info-text); white-space: nowrap; flex-shrink: 0; }
    .card-text { font-size: 12px; color: var(--text-secondary); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
    .card-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
    .card-video { width: 100%; aspect-ratio: 16/9; border: none; display: block; }
    .card-linkedin { width: 100%; aspect-ratio: 16/9; background: var(--info-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; color: var(--info-text); cursor: pointer; text-decoration: none; font-size: 13px; font-weight: 500; }
    .card-linkedin i { font-size: 32px; }
    .card-linkedin small { font-size: 11px; opacity: 0.7; }
    .card-media-wrap { position: relative; }
    .card-engagement-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(239,68,68,0.1); color: #DC2626; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1px solid rgba(239,68,68,0.15); white-space: nowrap; }
    .card-placeholder { width: 100%; aspect-ratio: 4/3; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 30px; }
    .card-footer { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .card-tags { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; min-width: 0; }
    .card-tag { font-size: 11px; padding: 2px 7px; border-radius: 20px; border: 1px solid var(--border); color: var(--text-secondary); white-space: nowrap; }
    .card-btn { background: none; border: none; cursor: pointer; color: var(--text-tertiary); padding: 4px; font-size: 16px; transition: color 0.15s; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-btn:hover { color: var(--text-primary); background: var(--bg-secondary); }
    .empty-state { grid-column: 1/-1; text-align: center; padding: 4rem 1rem; color: var(--text-tertiary); }
    .empty-state i { font-size: 36px; display: block; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; margin-bottom: 8px; }
    .empty-state small { font-size: 12px; }

    /* Toast */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--accent-text); padding: 9px 20px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 9999; white-space: nowrap; }
    .toast.show { opacity: 1; }

    /* Overlay */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 500; padding: 1rem; backdrop-filter: blur(2px); }
    .modal { background: var(--bg); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 1.5rem; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .modal-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .modal-close { background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: 20px; padding: 2px; border-radius: 4px; display: flex; align-items: center; }
    .modal-close:hover { background: var(--bg-secondary); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
    .field { margin-bottom: 1rem; }
    .field label { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; display: block; }
    .field input, .field textarea, .field select { width: 100%; font-size: 13px; font-family: inherit; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 8px 12px; background: var(--bg-secondary); color: var(--text-primary); outline: none; transition: border-color 0.15s; }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--border-hover); background: var(--bg); }
    .field textarea { resize: vertical; min-height: 90px; line-height: 1.5; }

    /* Settings */
    .settings-label { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 12px; display: block; }
    .filter-group { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
    .filter-group-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .rename-input { font-size: 13px; font-weight: 500; font-family: inherit; border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; background: var(--bg); color: var(--text-primary); outline: none; width: 150px; }
    .rename-input:focus { border-color: var(--border-hover); }
    .icon-btn { background: none; border: none; cursor: pointer; color: var(--text-tertiary); font-size: 16px; padding: 4px; border-radius: 4px; display: flex; align-items: center; transition: all 0.15s; }
    .icon-btn:hover { color: var(--text-primary); background: var(--bg-tertiary); }
    .icon-btn.danger:hover { color: var(--liked); }
    .filter-options { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .filter-option-pill { display: flex; align-items: center; gap: 5px; padding: 4px 10px; font-size: 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text-secondary); }
    .filter-option-pill button { background: none; border: none; cursor: pointer; color: var(--text-tertiary); font-size: 13px; padding: 0; line-height: 1; display: flex; align-items: center; transition: color 0.15s; }
    .filter-option-pill button:hover { color: var(--liked); }
    .add-option-row { display: flex; gap: 6px; }
    .add-option-row input { flex: 1; font-size: 12px; font-family: inherit; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 6px 10px; background: var(--bg); color: var(--text-primary); outline: none; }
    .add-option-row input:focus { border-color: var(--border-hover); }
    .add-option-row button { padding: 6px 12px; font-size: 12px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--bg); color: var(--text-secondary); cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
    .add-option-row button:hover { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    .add-filter-row { display: flex; gap: 8px; margin-top: 6px; }
    .add-filter-row input { flex: 1; font-size: 13px; font-family: inherit; border: 1px solid var(--border); border-radius: var(--radius-md); padding: 8px 12px; background: var(--bg-secondary); color: var(--text-primary); outline: none; }
    .add-filter-row input:focus { border-color: var(--border-hover); background: var(--bg); }

    /* Responsive */
    @media (max-width: 600px) {
      .app { padding: 16px 14px; }
      .search-box input { width: 120px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="brand">
      <div style="display:flex;align-items:baseline;">
        <span class="brand-name">Swipe<span>.</span>ardy</span>
      </div>
      <span class="count-badge" id="totalBadge">0 swipes</span>
    </div>
    <div class="header-right">
      <div class="search-box">
        <i class="ri-search-line"></i>
        <input type="text" placeholder="Search swipes..." id="searchInput" oninput="applyFilters()" />
      </div>
      <button class="btn-ghost" onclick="exportData()">
        <i class="ri-download-2-line"></i> Export
      </button>
      <button class="btn-ghost" onclick="document.getElementById('importInput').click()">
        <i class="ri-upload-2-line"></i> Import
      </button>
      <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)" />
      <button class="btn-ghost" onclick="openSettings()">
        <i class="ri-equalizer-line"></i> Manage filters
      </button>
      <button class="btn-primary" onclick="openAddModal()">
        <i class="ri-add-line"></i> Add swipe
      </button>
    </div>
  </div>

  <div class="filterbar" id="filterBar"></div>
  <div class="results-label" id="resultsLabel"></div>
  <div class="grid" id="cardGrid"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Edit swipe modal -->
<div class="overlay" id="editOverlay" style="display:none" onclick="handleOverlayClick(event,'editOverlay')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">Edit swipe</span>
      <button class="modal-close" onclick="closeEditModal()"><i class="ri-close-line"></i></button>
    </div>
    <div class="field"><label>Author name *</label><input type="text" id="e-author" /></div>
    <div class="field"><label>Post text *</label><textarea id="e-text"></textarea></div>
    <div class="field"><label>Image URL (optional)</label><input type="text" id="e-image" placeholder="https://..." /></div>
    <div class="field"><label>Platform</label>
      <select id="e-platform">
        <option>LinkedIn</option><option>Twitter</option><option>Instagram</option>
      </select>
    </div>
    <div class="field" style="display:flex;gap:8px">
      <div style="flex:1"><label>Reactions</label><input type="number" id="e-reactions" placeholder="0" /></div>
      <div style="flex:1"><label>Comments</label><input type="number" id="e-comments" placeholder="0" /></div>
      <div style="flex:1"><label>Reposts</label><input type="number" id="e-reposts" placeholder="0" /></div>
    </div>
    <div id="editDynamicFields"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-save" onclick="updateSwipe()">Save changes</button>
    </div>
  </div>
</div>



<!-- Add swipe modal -->
<div class="overlay" id="addOverlay" style="display:none" onclick="handleOverlayClick(event,'addOverlay')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">Add new swipe</span>
      <button class="modal-close" onclick="closeAddModal()"><i class="ri-close-line"></i></button>
    </div>
    <div class="field"><label>Author name *</label><input type="text" id="f-author" placeholder="e.g. Justin Welsh" /></div>
    <div class="field"><label>Post text *</label><textarea id="f-text" placeholder="Paste the post content here..."></textarea></div>
    <div class="field"><label>Image URL (optional)</label><input type="text" id="f-image" placeholder="https://..." /></div>
    <div class="field"><label>Platform</label>
      <select id="f-platform">
        <option>LinkedIn</option><option>Twitter</option><option>Instagram</option>
      </select>
    </div>
    <div class="field" style="display:flex;gap:8px">
      <div style="flex:1"><label>Reactions</label><input type="number" id="f-reactions" placeholder="0" /></div>
      <div style="flex:1"><label>Comments</label><input type="number" id="f-comments" placeholder="0" /></div>
      <div style="flex:1"><label>Reposts</label><input type="number" id="f-reposts" placeholder="0" /></div>
    </div>
    <div id="dynamicFields"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="btn-save" onclick="saveSwipe()">Save swipe</button>
    </div>
  </div>
</div>

<!-- Manage filters modal -->
<div class="overlay" id="settingsOverlay" style="display:none" onclick="handleOverlayClick(event,'settingsOverlay')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">Manage filters</span>
      <button class="modal-close" onclick="closeSettings()"><i class="ri-close-line"></i></button>
    </div>
    <span class="settings-label">Filter categories</span>
    <div id="filterGroupList"></div>
    <div class="add-filter-row">
      <input type="text" id="newFilterName" placeholder="New filter name (e.g. Tone, Goal, Niche...)" onkeydown="if(event.key==='Enter')addFilterGroup()" />
      <button class="btn-save" onclick="addFilterGroup()">Add filter</button>
    </div>
    <div class="modal-actions" style="margin-top:1.5rem;">
      <button class="btn-save" onclick="closeSettings()">Done</button>
    </div>
  </div>
</div>

  const LS_SWIPES = 'swipeardy_swipes_v1';

    {id:9,author:'Nicolas Cole',date:'Jan 7, 2026',platform:'LinkedIn',filters:{Category:'Hooks',Format:'Text only'},liked:false,text:"Every viral post has one thing in common. It's not the topic. It's the first line. Here are 7 proven hook structures that work every time.",image:''},
    {id:10,author:'Sahil Bloom',date:'Jan 5, 2026',platform:'LinkedIn',filters:{Category:'Personal',Format:'Single image'},liked:false,text:'I used to optimize for money. Now I optimize for energy. The shift happened after one brutal year where I had everything and felt nothing.',image:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&q=80'},
    {id:11,author:'Wes Kao',date:'Jan 4, 2026',platform:'LinkedIn',filters:{Category:'Strategy',Format:'Text only'},liked:true,text:'Most people confuse being busy with being effective. Here are 5 async habits that eliminated 90% of my unnecessary meetings.',image:''},
    {id:12,author:'Ana Canha',date:'Jan 2, 2026',platform:'LinkedIn',filters:{Category:'Design',Format:'Carousel'},liked:false,text:"A good infographic doesn't show everything — it shows the one thing that matters. I redesigned 50 posts using this principle. Engagement doubled.",image:'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=400&q=80'},
  ];

  function load(key, def) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e) { return def; } }
  function persist() { try { localStorage.setItem(LS_SWIPES, JSON.stringify(swipes)); localStorage.setItem(LS_FILTERS, JSON.stringify(filters)); } catch(e) {} }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  let filters = load(LS_FILTERS, DEFAULT_FILTERS);
  let swipes  = load(LS_SWIPES,  DEFAULT_SWIPES);
  let activeFilters = {};

  function fmtNum(n) { return n >= 1000 ? (n/1000).toFixed(1).replace(/\.0$/,'') + 'K' : n; }

  function getAv(n) { return AVATAR_COLORS[n.charCodeAt(0) % AVATAR_COLORS.length]; }
  function getInitials(n) { return n.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase(); }

  function getMedia(url) {
    if (!url) return '';
    if (/linkedin\.com/i.test(url)) return `<a href="${url}" target="_blank" class="card-linkedin"><i class="ri-play-circle-fill"></i> LinkedIn Video<small>Click to view post</small></a>`;
    const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (yt) return `<iframe class="card-video" src="https://www.youtube.com/embed/${yt[1]}" allowfullscreen></iframe>`;
    const vm = url.match(/vimeo\.com\/(\d+)/);
    if (vm) return `<iframe class="card-video" src="https://player.vimeo.com/video/${vm[1]}" allowfullscreen></iframe>`;
    if (/\.(mp4|webm|mov)$/i.test(url)) return `<video class="card-video" controls src="${url}"></video>`;
    return `<img src="${url}" alt="" class="card-img" onerror="this.style.display='none'" />`;
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(swipes, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'swipeardy-backup-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    showToast('Swipes exported ✓');
  }

  function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const imported = JSON.parse(e.target.result);
        if (!Array.isArray(imported)) { showToast('Invalid file format'); return; }
        if (!confirm('Import ' + imported.length + ' swipes? Existing swipes will be merged.')) return;
        const existing = new Set(swipes.map(s => s.id));
        imported.forEach(s => { if (!existing.has(s.id)) swipes.push(s); });
        persist(); applyFilters();
        showToast('Imported ' + imported.length + ' swipes ✓');
      } catch(err) { showToast('Invalid JSON file'); }
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  function renderFilterBar() {
    const bar = document.getElementById('filterBar');
    let html = '';
    Object.keys(filters).forEach(key => {
      const active = activeFilters[key];
      const safeKey = key.replace(/'/g, "\\'");
      html += `<div class="dropdown" id="dd-${key}">
        <button class="dropdown-btn ${active ? 'active' : ''}" onclick="toggleDD('${safeKey}')">
          ${active ? active : key} <i class="ri-arrow-down-s-line" style="font-size:14px"></i>
        </button>
        <div class="dropdown-menu" id="menu-${key}">
          <div class="dropdown-item ${!active ? 'selected' : ''}" onclick="setFilter('${safeKey}',null)">
            All ${key} ${!active ? '<i class="ri-check-line" style="font-size:13px"></i>' : ''}
          </div>
          ${filters[key].map(opt => {
            const safeOpt = opt.replace(/'/g, "\\'");
            return `<div class="dropdown-item ${active === opt ? 'selected' : ''}" onclick="setFilter('${safeKey}','${safeOpt}')">
              ${opt} ${active === opt ? '<i class="ri-check-line" style="font-size:13px"></i>' : ''}
            </div>`;
          }).join('')}
        </div>
      </div>`;
    });
    html += `<div class="divider"></div>
    <select class="sort-select" onchange="sortSwipes(this.value)">
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
    </select>`;
    bar.innerHTML = html;
  }

  function toggleDD(key) {
    document.querySelectorAll('.dropdown-menu').forEach(m => { if (m.id !== `menu-${key}`) m.classList.remove('open'); });
    const menu = document.getElementById(`menu-${key}`);
    if (menu) menu.classList.toggle('open');
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.dropdown')) document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
  });

  function setFilter(key, val) {
    if (val === null) delete activeFilters[key]; else activeFilters[key] = val;
    renderFilterBar(); applyFilters();
  }

  function sortSwipes(val) {
    if (val === 'newest') swipes.sort((a,b) => b.id - a.id);
    if (val === 'oldest') swipes.sort((a,b) => a.id - b.id);
    applyFilters();
  }

  function applyFilters() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const data = swipes.filter(s => {
      if (q && !s.text.toLowerCase().includes(q) && !s.author.toLowerCase().includes(q)) return false;
      for (const key of Object.keys(activeFilters)) {
        if (activeFilters[key] && s.filters[key] !== activeFilters[key]) return false;
      }
      return true;
    });
    document.getElementById('totalBadge').textContent = swipes.length + ' swipe' + (swipes.length !== 1 ? 's' : '');
    document.getElementById('resultsLabel').textContent = data.length + ' result' + (data.length !== 1 ? 's' : '');
    renderCards(data);
  }

  function renderCards(data) {
    const grid = document.getElementById('cardGrid');
    if (!data.length) {
      grid.innerHTML = `<div class="empty-state">
        <i class="ri-file-search-line"></i>
        <p>No swipes match your filters</p>
        <small>Try adjusting your filters or add a new swipe</small>
      </div>`;
      return;
    }
    grid.innerHTML = data.map(s => {
      const av = getAv(s.author);
      const tags = Object.values(s.filters || {}).filter(Boolean);
      const emoji = EMOJIS[s.filters && s.filters.Category] || '📌';
      return `<div class="card">
        <div class="card-body" onclick="openEditModal(${s.id})">
          <div class="card-top">
            <div class="card-author">
              <div class="avatar" style="background:${av.bg};color:${av.color}">${getInitials(s.author)}</div>
              <div>
                <div class="author-name">${s.author}</div>
                <div class="author-date">${s.date}</div>
              </div>
            </div>
            <span class="platform-badge">${s.platform}</span>
          </div>
          <p class="card-text">${s.text}</p>
          <div class="card-edit-hint"><i class="ri-edit-line" style="font-size:12px"></i> Click to edit</div>
        </div>
        ${(s.reactions || s.comments || s.reposts) ?
          `<div class="card-media-wrap">
            ${s.image ? getMedia(s.image) : `<div class="card-placeholder">${emoji}</div>`}
          </div>` :
          (s.image ? getMedia(s.image) : `<div class="card-placeholder">${emoji}</div>`)
        }
        <div class="card-footer">
          <div class="card-tags">${tags.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
          ${(s.reactions || s.comments || s.reposts) ?
            `<div class="card-engagement-badge"><i class="ri-line-chart-line" style="font-size:13px"></i>${fmtNum((s.reactions||0)+(s.comments||0)+(s.reposts||0))} engagements</div>` : ''
          }
          <button class="card-btn" onclick="deleteSwipe(${s.id})" title="Delete">
            <i class="ri-delete-bin-line"></i>
          </button>
        </div>
      </div>`;
    }).join('');
  }

  function deleteSwipe(id) {
    if (!confirm('Delete this swipe?')) return;
    swipes = swipes.filter(x => x.id !== id); persist(); applyFilters();
    showToast('Swipe deleted');
  }

  function openAddModal() {
    document.getElementById('dynamicFields').innerHTML = Object.keys(filters).map(key => `
      <div class="field"><label>${key}</label>
      <select id="ff-${key}">
        <option value="">— Select ${key} —</option>
        ${filters[key].map(o => `<option>${o}</option>`).join('')}
      </select></div>`).join('');
    document.getElementById('addOverlay').style.display = 'flex';
    setTimeout(() => document.getElementById('f-author').focus(), 50);
  }

  function closeAddModal() {
    document.getElementById('addOverlay').style.display = 'none';
    ['f-author','f-text','f-image','f-reactions','f-comments','f-reposts'].forEach(id => document.getElementById(id).value = '');
  }

  function saveSwipe() {
    const author = document.getElementById('f-author').value.trim();
    const text   = document.getElementById('f-text').value.trim();
    if (!author || !text) { showToast('Author and text are required'); return; }
    const image    = document.getElementById('f-image').value.trim();
    const platform = document.getElementById('f-platform').value;
    const sf = {};
    Object.keys(filters).forEach(key => { const v = document.getElementById(`ff-${key}`)?.value; if (v) sf[key] = v; });
    const date = new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
    const reactions = parseInt(document.getElementById('f-reactions').value) || 0;
    const comments  = parseInt(document.getElementById('f-comments').value) || 0;
    const reposts   = parseInt(document.getElementById('f-reposts').value) || 0;
    swipes.unshift({ id: Date.now(), author, date, platform, filters: sf, liked: false, text, image, reactions, comments, reposts });
    persist(); closeAddModal(); applyFilters();
    showToast('Swipe saved ✓');
  }

  let editingId = null;

  function openEditModal(id) {
    const s = swipes.find(x => x.id === id);
    if (!s) return;
    editingId = id;
    document.getElementById('e-author').value  = s.author;
    document.getElementById('e-text').value    = s.text;
    document.getElementById('e-image').value   = s.image || '';
    document.getElementById('e-platform').value = s.platform;
    document.getElementById('e-reactions').value = s.reactions || '';
    document.getElementById('e-comments').value  = s.comments || '';
    document.getElementById('e-reposts').value   = s.reposts || '';
    document.getElementById('editDynamicFields').innerHTML = Object.keys(filters).map(key => `
      <div class="field"><label>${key}</label>
      <select id="ef-${key}">
        <option value="">— Select ${key} —</option>
        ${filters[key].map(o => `<option ${(s.filters&&s.filters[key])===o?'selected':''}>${o}</option>`).join('')}
      </select></div>`).join('');
    document.getElementById('editOverlay').style.display = 'flex';
    setTimeout(() => document.getElementById('e-author').focus(), 50);
  }

  function closeEditModal() {
    document.getElementById('editOverlay').style.display = 'none';
    editingId = null;
  }

  function updateSwipe() {
    const s = swipes.find(x => x.id === editingId);
    if (!s) return;
    const author = document.getElementById('e-author').value.trim();
    const text   = document.getElementById('e-text').value.trim();
    if (!author || !text) { showToast('Author and text are required'); return; }
    s.author   = author;
    s.text     = text;
    s.image    = document.getElementById('e-image').value.trim();
    s.platform = document.getElementById('e-platform').value;
    s.reactions = parseInt(document.getElementById('e-reactions').value) || 0;
    s.comments  = parseInt(document.getElementById('e-comments').value) || 0;
    s.reposts   = parseInt(document.getElementById('e-reposts').value) || 0;
    Object.keys(filters).forEach(key => {
      const v = document.getElementById(`ef-${key}`)?.value;
      if (v) s.filters[key] = v; else delete s.filters[key];
    });
    persist(); closeEditModal(); applyFilters();
    showToast('Swipe updated ✓');
  }

  function openSettings() { renderSettingsPanel(); document.getElementById('settingsOverlay').style.display = 'flex'; }

  function closeSettings() {
    document.getElementById('settingsOverlay').style.display = 'none';
    persist(); renderFilterBar(); applyFilters();
  }

  function renderSettingsPanel() {
    document.getElementById('filterGroupList').innerHTML = Object.keys(filters).map(key => {
      const safeKey = key.replace(/'/g, "\\'");
      return `<div class="filter-group">
        <div class="filter-group-header">
          <input class="rename-input" value="${key}" onblur="renameFilter('${safeKey}', this.value)" />
          <button class="icon-btn danger" onclick="deleteFilterGroup('${safeKey}')" title="Delete filter">
            <i class="ri-delete-bin-line"></i>
          </button>
        </div>
        <div class="filter-options">
          ${filters[key].map(opt => {
            const safeOpt = opt.replace(/'/g, "\\'");
            return `<span class="filter-option-pill">${opt}
              <button onclick="removeOption('${safeKey}','${safeOpt}')" title="Remove">
                <i class="ri-close-line"></i>
              </button>
            </span>`;
          }).join('')}
        </div>
        <div class="add-option-row">
          <input type="text" id="newoption-${key}" placeholder="Add option..." onkeydown="if(event.key==='Enter')addOption('${safeKey}')" />
          <button onclick="addOption('${safeKey}')">+ Add</button>
        </div>
      </div>`;
    }).join('');
  }

  function renameFilter(oldKey, newKey) {
    newKey = newKey.trim();
    if (!newKey || newKey === oldKey) return;
    const keys = Object.keys(filters);
    const newF = {};
    keys.forEach(k => { newF[k === oldKey ? newKey : k] = filters[k]; });
    filters = newF;
    if (activeFilters[oldKey]) { activeFilters[newKey] = activeFilters[oldKey]; delete activeFilters[oldKey]; }
    renderSettingsPanel();
  }

  function deleteFilterGroup(key) {
    if (!confirm(`Delete the "${key}" filter?`)) return;
    delete filters[key]; delete activeFilters[key];
    renderSettingsPanel();
  }

  function addOption(key) {
    const input = document.getElementById(`newoption-${key}`);
    const val = input.value.trim();
    if (!val || filters[key].includes(val)) return;
    filters[key].push(val); input.value = '';
    renderSettingsPanel();
  }

  function removeOption(key, opt) {
    filters[key] = filters[key].filter(o => o !== opt);
    renderSettingsPanel();
  }

  function addFilterGroup() {
    const input = document.getElementById('newFilterName');
    const name = input.value.trim();
    if (!name || filters[name]) return;
    filters[name] = []; input.value = '';
    renderSettingsPanel();
  }

  function handleOverlayClick(e, id) {
    if (e.target.id === id) {
      if (id === 'addOverlay') closeAddModal();
      if (id === 'editOverlay') closeEditModal();
      if (id === 'settingsOverlay') closeSettings();
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeAddModal(); closeEditModal(); closeSettings(); }
  });

  renderFilterBar();
  applyFilters();
</script>
</body>
</html>
